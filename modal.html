*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:#f8fafc;color:#0f172a;font-size:14px}
:root{
  --blue:#1d4ed8;--blue-l:#dbeafe;--navy:#0c1a35;
  --green:#059669;--green-l:#d1fae5;
  --amber:#d97706;--amber-l:#fef3c7;
  --red:#dc2626;--red-l:#fee2e2;
  --border:#e2e8f0;--muted:#64748b;--bg:#f8fafc
}
input,select,textarea{
  font-family:inherit;border:1.5px solid var(--border);border-radius:7px;
  padding:7px 11px;font-size:13px;color:#0f172a;background:white;
  width:100%;outline:none;transition:border 0.15s
}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.field{margin-bottom:12px}
.field.full{grid-column:1/-1}
.btn{border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;
  display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
.btn-primary{background:var(--blue);color:white}
.btn-primary:hover{background:#1e40af}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:99px;font-size:12px;font-weight:700;border:1.5px solid}
.section-title{font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.alert{padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-info{background:#eff6ff;border:1.5px solid #bfdbfe;color:#1e3a8a}
.alert-warn{background:var(--amber-l);border:1.5px solid #fbbf24;color:#92400e}
.alert-ok{background:var(--green-l);border:1.5px solid #6ee7b7;color:#065f46}
/* ── Template picker ── */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.tpl-card{background:white;border:2px solid var(--border);border-radius:12px;
  padding:16px 14px;cursor:pointer;text-align:center;transition:all 0.18s}
.tpl-card:hover,.tpl-card.sel{border-color:var(--blue);background:var(--blue-l)}
.tpl-card .ico{font-size:28px;margin-bottom:8px}
.tpl-card .name{font-size:13px;font-weight:700;color:#0f172a}
.tpl-card .desc{font-size:11px;color:var(--muted);margin-top:3px}
/* ── Form container ── */
.form-wrap{background:white;border:1.5px solid var(--border);border-radius:12px;padding:16px}
/* ── Footer ── */
.footer{display:flex;gap:8px;justify-content:flex-end;padding-top:14px;
  border-top:1.5px solid var(--border);margin-top:14px}
/* ── List picker ── */
.list-item{padding:8px 12px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:background 0.1s}
.list-item:hover{background:var(--bg)}
.list-item.sel{background:var(--blue-l);font-weight:700;color:var(--blue)}
/* ── Priority ── */
.prio-wrap{display:flex;gap:8px}
.prio-btn{flex:1;padding:7px;border-radius:7px;border:1.5px solid var(--border);
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s}
.prio-btn.sel-normal{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
.prio-btn.sel-urgente{background:#fef3c7;border-color:#fbbf24;color:#92400e}
.prio-btn.sel-muy-urgente{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
/* ── Settings ── */
.settings-block{background:white;border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
/* ── Card detail ── */
.detail-row{display:flex;gap:6px;margin-bottom:8px;align-items:flex-start}
.detail-label{font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.04em;min-width:110px;padding-top:2px}
.detail-val{font-size:13px;color:#0f172a;font-weight:500}
/* ── Misc ── */
.tag{background:#ede9fe;color:#6d28d9;padding:3px 9px;border-radius:6px;
  font-size:11px;font-weight:700;margin-right:4px}
.scroll{overflow-y:auto;padding:16px}
</style>

// Normaliza matrícula para comparación — quita E inicial, espacios, guiones
function normMatricula(m){
  if(!m)return '';
  return m.toUpperCase().trim()
    .replace(/^E[-\s]?/,'')   // quita E o E- del principio
    .replace(/[\s\-]/g,'');   // quita espacios y guiones
}

function renderNewRequest(){

function renderWho(){
  // Mostrar pantalla de carga mientras detectamos el usuario
  app().innerHTML='<div class="scroll" style="text-align:center;padding:40px 20px">'
    +'<div style="font-size:11px;font-weight:800;letter-spacing:0.1em;color:#64748b;margin-bottom:14px;text-transform:uppercase">Usuario</div>'
    +'<div style="font-size:14px;color:#64748b">Detectando usuario de Trello...</div>'
    +'</div>';
  t.sizeTo('#app');

  // Intentar obtener usuario via SDK de Trello
  t.member('all')
  .then(function(member){
    if(member && member.fullName){
      state.userName=member.fullName.toUpperCase();
      state.userDetected=true;
      state.step='pick';
      render();
    } else {
      // fullName vacío → mostrar selector manual
      renderWhoManual();
    }
  })
  .catch(function(){
    // t.member falló → mostrar selector manual
    renderWhoManual();
  });
}

function getInitials(name){
  var parts=name.trim().split(' ');
  if(parts.length>=2) return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  return name.substring(0,2).toUpperCase();
}
function getAvatarColor(name){
  var colors=['#1d4ed8','#7c3aed','#059669','#d97706','#dc2626','#0369a1','#065f46','#92400e'];
  var idx=0;
  for(var i=0;i<name.length;i++) idx+=name.charCodeAt(i);
  return colors[idx%colors.length];
}

function renderWhoManual(){
  var html='<div class="scroll">';
  html+='<div style="text-align:center;padding:10px 0 18px">';
  html+='<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:18px;color:#0c1a35;margin-bottom:4px">¿Quién eres?</div>';
  html+='<div style="font-size:12px;color:#64748b">Selecciona tu nombre para registrar la solicitud</div>';
  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px">';
  STAFF.forEach(function(name){
    var sel=state.userName===name;
    var col=getAvatarColor(name);
    var initials=getInitials(name);
    html+='<button onclick="selectWho(\''+name+'\')" style="'
      +'background:'+(sel?col:'white')+';'
      +'border:2px solid '+(sel?col:'#e2e8f0')+';'
      +'border-radius:12px;padding:12px 10px;font-family:inherit;'
      +'cursor:pointer;display:flex;align-items:center;gap:10px;'
      +'transition:all 0.15s;text-align:left" '
      +'onmouseover="if(!'+sel+')this.style.borderColor=\''+col+'\'" '
      +'onmouseout="if(!'+sel+')this.style.borderColor=\'#e2e8f0\'">';
    html+='<div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;'
      +'background:'+(sel?'rgba(255,255,255,0.25)':col)+';'
      +'display:flex;align-items:center;justify-content:center;'
      +'font-size:13px;font-weight:800;color:white;letter-spacing:0.02em">'+initials+'</div>';
    html+='<div style="font-size:12px;font-weight:700;color:'+(sel?'white':'#0f172a')+';line-height:1.2">'+name+'</div>';
    html+='</button>';
  });
  html+='</div>';
  if(state.msg){html+='<div class="alert alert-'+(state.msg.type||'warn')+'">'+state.msg.text+'</div>';}
  html+='<div style="display:flex;justify-content:flex-end;gap:8px">';
  html+='<button class="btn btn-ghost" onclick="t.closeModal()">Cancelar</button>';
  html+='<button class="btn btn-primary" onclick="confirmWho()">Continuar →</button>';
  html+='</div></div>';
  app().innerHTML=html;
  t.sizeTo('#app');
}

function selectWho(name){
  state.userName=name;
  state.msg=null;
  renderWhoManual();
}

function confirmWho(){
  if(!state.userName){
    state.msg={type:'warn',text:'⚠️ Selecciona tu nombre para continuar'};
    return renderWhoManual();
  }
  state.step='pick';
  render();
}

function pickTemplate(id){
  state.tpl=TEMPLATES[id];

function selectChanged(id,sub,val){
  state.values[id]=val;
  if(id==='marca'){
    state.marca=val;
    // Reset modelo al primer valor de la nueva marca
    var newModelos=MODELOS[val]||['Otro modelo'];
    state.values['modelo']=newModelos[0];
    renderForm();
  }
}
function setPriority(p){state.priority=p;renderForm();}

function toggleSinCita(checked){
  state.values['sin_cita']=checked;
  if(checked){
    state.values['fecha_cita']='';
  }
  renderForm();
}

function validarMatricula(m){
  if(!m)return false;
  m=m.toUpperCase().trim();
  var actual=/^[0-9]{4}[BCDFGHJKLMNPRSTUVWXYZ]{3}$/.test(m);
  var antiguo=/^[A-Z]{1,2}[0-9]{4}[A-Z]{1,2}$/.test(m);
  var especial=/^[A-Z]{1,3}[0-9]{4,6}$/.test(m);
  return actual||antiguo||especial;
}

function submitForm(){
  var tpl=state.tpl;
  // Excluir fecha_cita del check genérico (tiene su propia validación abajo)
  var missing=tpl.fields.filter(function(f){
    return f.required && f.type!=='fecha_cita' && !state.values[f.id];
  });
  if(missing.length){
    state.msg={type:'warn',text:'⚠️ Completa los campos obligatorios: '+missing.map(function(f){return f.label;}).join(', ')};
    return render();
  }
  if(state.values['matricula']&&!validarMatricula(state.values['matricula'])){
    state.msg={type:'warn',text:'⚠️ Matrícula no válida. Formatos: 1234BCD (actual) o AB1234CD (antiguo)'};
    return render();
  }
  // Validar fecha de cita obligatoria
  var hasFechaCita=tpl.fields.some(function(f){return f.type==='fecha_cita';});
  if(hasFechaCita&&!state.values['fecha_cita']&&!state.values['sin_cita']){
    state.msg={type:'warn',text:'⚠️ Obligatorio: selecciona una fecha de cita o marca "Vehículo sin cita asignada"'};
    return render();
  }
  // ── Comprobar duplicados antes de continuar ──────────────────────────
  var API_KEY='a94def1efe06824418ef1ebc9bd12b4c';
  var API_TOKEN='ATTAd63dce7afe7a2caaaab52dd8241ee74a60ce42b48610f1d359b3e83b3aa68f1eA5746F5A';
  state.apiKey=API_KEY;
  state.apiToken=API_TOKEN;

  var matriculaBuscar=normMatricula(state.values['matricula']||'');
  if(matriculaBuscar && !state.skipDupCheck){
    state.saving=true;
    state.msg={type:'info',text:'Verificando duplicados...'};
    render();
    fetch('https://api.trello.com/1/boards/QNEswrD1/cards?key='+API_KEY+'&token='+API_TOKEN+'&filter=open&fields=id,name,idList,desc')
    .then(function(r){return r.json();})
    .then(function(cards){
      // Buscar tarjetas con matrícula coincidente (con o sin E)
      var matches=cards.filter(function(c){
        var cn=normMatricula(c.name);
        // extraer matrícula del título: [TIPO] - MATRICULA - ...
        var parts=c.name.split(' - ');
        var cardMat=parts.length>1?normMatricula(parts[1]):'';
        return cardMat===matriculaBuscar || cn.indexOf(matriculaBuscar)!==-1;
      });
      state.saving=false;
      if(matches.length>0){
        state.duplicates=matches;
        state.step='dup-check';
        render();
      } else {
        // Sin duplicados — continuar normal
        proceedToListPick();
      }
    })
    .catch(function(){
      // Error en la búsqueda — continuar sin bloquear
      state.saving=false;
      proceedToListPick();
    });
    return;
  }

  proceedToListPick();
}

function proceedToListPick(){
  var API_KEY='a94def1efe06824418ef1ebc9bd12b4c';
  var API_TOKEN='ATTAd63dce7afe7a2caaaab52dd8241ee74a60ce42b48610f1d359b3e83b3aa68f1eA5746F5A';
  state.saving=true;

  fetch('https://api.trello.com/1/boards/QNEswrD1/lists?key='+API_KEY+'&token='+API_TOKEN+'&filter=open')

    state.lists=lists||[];
    state.saving=false;
    if(!state.lists.length){state.msg={type:'warn',text:'⚠️ No se encontraron listas.'};render();return;}
    var defaultList=state.lists.find(function(l){return l.id==='68a4531b010b18274c39d3a8';});
    state.selectedList=defaultList?defaultList.id:state.lists[0].id;
    state.step='list-pick';

    state.saving=false;

    render();
  });
}

      +'</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
      +'<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;'+(prioStyles[state.priority]||prioStyles.normal)+'">'+(prioLabels[state.priority]||'Normal')+'</span>'
      +(v.fecha_cita?'<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e3a8a;border:1.5px solid #93c5fd">📅 '+v.fecha_cita+'</span>':'')
      +(state.values.sin_cita?'<span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:#f1f5f9;color:#475569;border:1.5px solid #94a3b8">Sin cita</span>':'')
      +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
      +'<button class="btn btn-ghost" onclick="state.step=\'who\';state.values={};state.msg=null;state.skipDupCheck=false;render()">Nueva solicitud</button>'
      +'<button class="btn btn-primary" onclick="t.closeModal()">Cerrar</button>'
      +'</div></div>';
    t.sizeTo('#app');
  })
  .catch(function(err){
    state.saving=false;
    state.msg={type:'warn',text:'❌ Error al crear la tarjeta: '+err.message};
    state.step='list-pick';
    render();
  });
  }).catch(function(err){
    state.saving=false;
    state.msg={type:'warn',text:'❌ Error al crear la tarjeta: '+err.message};
    render();
  });
}

function buildDesc(tpl,v,pedidoPor){
  var brandIco='';
  var vehiculo=v.marca?(brandIco+' '+(v.marca).toUpperCase()+(v.modelo?' '+v.modelo.toUpperCase():'')):null;
  var lines=['## '+tpl.name.toUpperCase(),''];
  pedidoPor=pedidoPor||'';
  var labels={
    matricula:'🚗 Matrícula',cliente:'👤 Cliente',telefono:'📞 Teléfono',
    marca:'🏷 Marca',modelo:'🚙 Modelo',vin:'🔑 VIN/Bastidor',
    tipo_airbag:'💥 Tipo airbag',medida:'📏 Medida',cantidad:'🔢 Cantidad',
    tipo:'❄️ Tipo',marca_neum:'🏷 Marca',con_llanta:'🛞 Con llanta',
    referencia:'#️⃣ Referencia',descripcion:'📝 Descripción',
    que_necesita:'🔧 Qué necesita',proveedor:'🏪 Proveedor',solicitado_por:'👤 Solicitado por',notas:'📋 Notas'
  };
  if(vehiculo)lines.push('**'+vehiculo+'**');
  tpl.fields.forEach(function(f){
    if(f.type==='priority')return;
    if(f.id==='marca'||f.id==='modelo')return; // ya lo mostramos arriba
    var val=v[f.id]||(f.type==='select'?f.opts&&f.opts[0]:null);
    if(!val)return;
    lines.push((labels[f.id]||f.label)+': **'+val+'**');
  });
  var pmap={normal:'🟢 Normal',urgente:'⚠️ Urgente','muy-urgente':'🔴 MUY URGENTE'};
  lines.push('','⚡ Prioridad: **'+(pmap[state.priority]||state.priority)+'**');
  if(pedidoPor)lines.push('👤 Pedido por: **'+pedidoPor+'**');
  lines.push('','---','*Generado con Stellantis Recambios Power-Up*');
  return lines.join('\n');
}

/* ══════════════════════════════════════════════════════════════
   MODO: DETALLE DE TARJETA
══════════════════════════════════════════════════════════════ */
function renderCardDetail(){
  t.get('card','shared','pedido-data').then(function(data){
    if(!data){
      app().innerHTML='<div class="scroll"><div class="alert alert-warn">Esta tarjeta no tiene datos de plantilla almacenados. Solo las tarjetas creadas con el Power-Up tienen información estructurada.</div>'
        +'<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-ghost" onclick="t.closeModal()">Cerrar</button></div></div>';
      t.sizeTo('#app');return;
    }

    var tpl=TEMPLATES[data.template]||{ico:'PED',name:'Pedido',fields:[]};
    var v=data.fields||{};
    var pmap={normal:'🟢 Normal',urgente:'⚠️ Urgente','muy-urgente':'🔴 MUY URGENTE'};

    var html='<div class="scroll">';
    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
    html+='<div style="font-size:24px">'+tpl.ico+'</div>';
    html+='<div style="flex:1"><div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:15px">'+tpl.name+'</div>';
    html+='<div style="font-size:11px;color:#64748b">'+new Date(data.createdAt).toLocaleString('es-ES')+'</div></div>';
    html+='<div class="chip" style="'+(data.priority==='muy-urgente'?'background:#fee2e2;border-color:#fca5a5;color:#991b1b':data.priority==='urgente'?'background:#fef3c7;border-color:#fbbf24;color:#92400e':'background:#d1fae5;border-color:#6ee7b7;color:#065f46')+'">'+
      (pmap[data.priority]||'Normal')+'</div>';
    html+='</div>';

    html+='<div style="background:white;border:1.5px solid var(--border);border-radius:10px;padding:14px">';
    tpl.fields.forEach(function(f){
      if(f.type==='priority')return;
      var val=v[f.id];
      if(!val)return;
      html+='<div class="detail-row"><div class="detail-label">'+f.label+'</div>';
      html+='<div class="detail-val" style="'+(f.mono||f.upper?'font-family:monospace;letter-spacing:0.05em':'')+'">'+val+'</div></div>';
    });
    html+='</div>';

    html+='<div class="footer"><button class="btn btn-ghost" onclick="t.closeModal()">Cerrar</button></div>';
    html+='</div>';
    app().innerHTML=html;
    t.sizeTo('#app');
  });
}

/* ══════════════════════════════════════════════════════════════
   MODO: CONFIGURACIÓN
══════════════════════════════════════════════════════════════ */
function renderSettings(){
  Promise.all([
    t.get('member','private','apiKey'),
    t.get('member','private','apiToken')
  ]).then(function(res){
    var key=res[0]||'';
    var tok=res[1]||'';

    var html='<div class="scroll">';
    html+='<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:16px;margin-bottom:4px">⚙️ Configuración</div>';
    html+='<div style="font-size:12px;color:#64748b;margin-bottom:16px">Tus credenciales se guardan de forma privada en tu cuenta de Trello</div>';

    html+='<div class="alert alert-info">1. Ve a <a href="https://trello.com/app-key" target="_blank" style="color:#1d4ed8;font-weight:700">trello.com/app-key</a> y copia tu <b>API Key</b><br>2. En esa misma página haz clic en <b>"Generar Token"</b> y autoriza la app<br>3. Pega ambos aquí abajo y guarda</div>';

    html+='<div class="settings-block">';
    html+='<div class="field"><label>API Key de Trello</label>';
    html+='<input id="cfg_key" type="text" value="'+key+'" placeholder="Pega tu API Key"></div>';
    html+='<div class="field"><label>Token de Trello</label>';
    html+='<input id="cfg_tok" type="password" value="'+tok+'" placeholder="Pega tu Token"></div>';
    html+='</div>';

    if(state.msg){html+='<div class="alert alert-'+(state.msg.type||'info')+'">'+state.msg.text+'</div>';}

    html+='<div class="footer">';
    html+='<button class="btn btn-ghost" onclick="t.closeModal()">Cerrar</button>';
    html+='<button class="btn btn-primary" onclick="saveSettings()">💾 Guardar configuración</button>';
    html+='</div></div>';

    app().innerHTML=html;
    t.sizeTo('#app');
  });
}

function saveSettings(){
  var key=($('cfg_key')||{}).value||'';
  var tok=($('cfg_tok')||{}).value||'';
  if(!key||!tok){state.msg={type:'warn',text:'⚠️ Ambos campos son obligatorios'};return renderSettings();}
  Promise.all([
    t.set('member','private','apiKey',key),
    t.set('member','private','apiToken',tok)
  ]).then(function(){
    state.msg={type:'ok',text:'✅ Configuración guardada correctamente'};
    renderSettings();
  });
}

/* ── init ── */
render();
</script>
