<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
// Icono SVG en base64 — no depende de ningún servidor externo
var ICON_URL = 'data:image/svg+xml;base64,'+btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>');

var BASE_URL = (function(){
  var s = window.location.href;
  return s.substring(0, s.lastIndexOf('/') + 1);
})();

TrelloPowerUp.initialize({

  /* ── Dos botones en la cabecera: Nueva Solicitud + ⚙️ Config ── */
  'board-buttons': function(t) {
    return [
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: '📋 Nueva Solicitud',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'modal.html?mode=new-request',
            title:  'Nueva Solicitud de Recambios',
            height: 620,
            fullscreen: false
          });
        }
      },
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: '⚙️ Configurar API',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'modal.html?mode=settings',
            title:  'Configuración · API Key y Token',
            height: 440,
            fullscreen: false
          });
        }
      }
    ];
  },

  /* ── Botón en el reverso de cada tarjeta ── */
  'card-buttons': function(t) {
    return [{
      icon: ICON_URL,
      text: 'Ver / Editar Pedido',
      callback: function(t) {
        return t.modal({
          url:   BASE_URL + 'modal.html?mode=card-detail',
          title: 'Detalles del Pedido',
          height: 560
        });
      }
    }];
  },

  /* ── Sección resumen en el reverso de la tarjeta ── */
  'card-back-section': function(t) {
    return {
      title: '🔧 Datos del Pedido',
      icon:  ICON_URL,
      content: {
        type:   'iframe',
        url:    t.signUrl(BASE_URL + 'card-section.html'),
        height: 230
      }
    };
  },

  /* ── Settings (por si funciona desde el menú) ── */
  'show-settings': function(t) {
    return t.modal({
      url:    BASE_URL + 'modal.html?mode=settings',
      title:  'Configuración · API Key y Token',
      height: 440,
      fullscreen: false
    });
  }

}, {
  appName: 'Stellantis Recambios'
});
</script>
</body>
</html>
