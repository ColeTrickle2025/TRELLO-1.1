<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
// Icono corporativo SVG — letra S sobre fondo azul marino
var _svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">'
  +'<rect width="24" height="24" rx="4" fill="%230c1a35"/>'
  +'<text x="12" y="17" font-family="Arial,sans-serif" font-size="14" font-weight="bold" '
  +'fill="%23ffffff" text-anchor="middle">S</text>'
  +'</svg>';
var ICON_URL='data:image/svg+xml;charset=utf-8,'+_svg;

var BASE_URL = (function(){
  var s = window.location.href;
  return s.substring(0, s.lastIndexOf('/') + 1);
})();

TrelloPowerUp.initialize({

  /* ── Dos botones en la cabecera: Nueva Solicitud + ⚙️ Config ── */
  'board-buttons': function(t) {
    return [
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Nueva Solicitud',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'modal.html?mode=new-request',
            title:  'Nueva Solicitud de Recambios',
            height: 620,
            fullscreen: false
          });
        }
      },
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Buscar matrícula',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'search.html',
            title:  'Buscar pedido',
            height: 520,
            fullscreen: false
          });
        }
      },
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Importar ServiceBox',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'import-servicebox.html',
            title:  'Importar desde ServiceBox',
            height: 620,
            fullscreen: false
          });
        }
      },
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Configuración',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'settings.html',
            title:  'Configuración · Stellantis Recambios',
            height: 580,
            fullscreen: true
          });
        }
      }
    ];
  },

  /* ── Botón en el reverso de cada tarjeta ── */
  'card-buttons': function(t) {
    return [{
      icon: ICON_URL,
      text: 'Ver / Editar Pedido',
      callback: function(t) {
        return t.modal({
          url:   BASE_URL + 'modal.html?mode=card-detail',
          title: 'Detalles del Pedido',
          height: 560
        });
      }
    }];
  },


  /* ── Botón en el menú (···) de cada lista ── */
  'list-actions': function(t) {
    return [
      {
        text: 'Nueva Solicitud de Recambios',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'modal.html?mode=new-request',
            title:  'Nueva Solicitud de Recambios',
            height: 620,
            fullscreen: false
          });
        }
      },
      {
        text: 'Buscar matrícula',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'search.html',
            title:  'Buscar pedido',
            height: 520,
            fullscreen: false
          });
        }
      }
    ];
  },

  /* ── Settings (por si funciona desde el menú) ── */
  'show-settings': function(t) {
    return t.modal({
      url:    BASE_URL + 'settings.html',
      title:  'Configuración · Stellantis Recambios',
      height: 580,
      fullscreen: true
    });
  }

}, {
  appName: 'Stellantis Recambios'
});
</script>
</body>
</html>
