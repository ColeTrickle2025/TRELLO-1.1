<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
// Icono corporativo SVG — letra S sobre fondo azul marino
var _svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">'
  +'<rect width="24" height="24" rx="4" fill="%230c1a35"/>'
  +'<text x="12" y="17" font-family="Arial,sans-serif" font-size="14" font-weight="bold" '
  +'fill="%23ffffff" text-anchor="middle">S</text>'
  +'</svg>';
var ICON_URL='data:image/svg+xml;charset=utf-8,'+_svg;

var BASE_URL = (function(){
  var s = window.location.href;
  return s.substring(0, s.lastIndexOf('/') + 1);
})();

TrelloPowerUp.initialize({

  /* ── Dos botones en la cabecera: Nueva Solicitud + ⚙️ Config ── */
  'board-buttons': function(t) {
    return [
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Nueva Solicitud',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'modal.html?mode=new-request',
            title:  'Nueva Solicitud de Recambios',
            height: 620,
            fullscreen: false
          });
        }
      },
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Buscar matrícula',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'search.html',
            title:  'Buscar pedido',
            height: 520,
            fullscreen: false
          });
        }
      },
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Importar ServiceBox',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'import-servicebox.html',
            title:  'Importar desde ServiceBox',
            height: 900,
            fullscreen: true
          });
        }
      },
      {
        icon: { dark: ICON_URL, light: ICON_URL },
        text: 'Configuración',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'settings.html',
            title:  'Configuración · Stellantis Recambios',
            height: 580,
            fullscreen: true
          });
        }
      }
    ];
  },

  /* ── Botones en el reverso de cada tarjeta (dinámicos según config) ── */
  'card-buttons': function(t) {
    return t.get('board','shared','stellantis-config').then(function(cfg){
      var buttons = [];

      // Botón fijo: Ver / Editar Pedido
      buttons.push({
        icon: ICON_URL,
        text: 'Ver / Editar Pedido',
        callback: function(t) {
          return t.modal({
            url:   BASE_URL + 'modal.html?mode=card-detail',
            title: 'Detalles del Pedido',
            height: 560
          });
        }
      });

      // Botones de movimiento rápido configurados
      var quickIds = (cfg && cfg.quickMoveListIds) ? cfg.quickMoveListIds : [];
      var lists    = (cfg && cfg.lists) ? cfg.lists : {};

      // Build list name map from config
      var LIST_NAMES = {
        '68a4531b010b18274c39d3a8': 'PEDIDOS',
        '68a4531b010b18274c39d3a9': 'En tránsito',
        '69a6c24fef3798bd7e680e8b': 'J.OLIVER / SIN CITA',
        '69f21c8451c079bf1a2a3e20': 'RAUL / SIN CITA',
        '69f21c945b3ef6ba7cfcfc6d': 'CHARLY / SIN CITA',
        '69f22828cd309506fef4e59d': 'JORDI F. / SIN CITA',
        '68a6d0d6a3dc70045ddd13ee': 'CON CITA / Avisado',
        '69398a369afd8d4d2f14bded': 'ENTREGADO EN TALLER',
        '698e0a66ab8312b60d46eee3': 'REVISAR RECEPCION',
      };

      quickIds.forEach(function(listId){
        var listName = LIST_NAMES[listId] || listId;
        buttons.push({
          icon: ICON_URL,
          text: '→ ' + listName,
          callback: (function(lid, lname){
            return function(t){
              return t.popup({
                title: 'Mover a: ' + lname,
                url:   BASE_URL + 'quick-move.html?listId='+lid+'&listName='+encodeURIComponent(lname),
                height: 340
              });
            };
          })(listId, listName)
        });
      });

      return buttons;
    }).catch(function(){
      // Fallback: solo el botón de ver pedido
      return [{
        icon: ICON_URL,
        text: 'Ver / Editar Pedido',
        callback: function(t) {
          return t.modal({
            url:   BASE_URL + 'modal.html?mode=card-detail',
            title: 'Detalles del Pedido',
            height: 560
          });
        }
      }];
    });
  },


  /* ── Botón en el menú (···) de cada lista ── */
  'list-actions': function(t) {
    return [
      {
        text: 'Nueva Solicitud de Recambios',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'modal.html?mode=new-request',
            title:  'Nueva Solicitud de Recambios',
            height: 620,
            fullscreen: false
          });
        }
      },
      {
        text: 'Buscar matrícula',
        callback: function(t) {
          return t.modal({
            url:    BASE_URL + 'search.html',
            title:  'Buscar pedido',
            height: 520,
            fullscreen: false
          });
        }
      }
    ];
  },

  /* ── Settings (por si funciona desde el menú) ── */
  'show-settings': function(t) {
    return t.modal({
      url:    BASE_URL + 'settings.html',
      title:  'Configuración · Stellantis Recambios',
      height: 580,
      fullscreen: true
    });
  }

}, {
  appName: 'Stellantis Recambios'
});
</script>
</body>
</html>
